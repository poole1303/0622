<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 岩石互動</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:"Noto Sans TC", Arial, sans-serif;
}

/* 返回按鈕 */
#back{
  position:fixed;
  top:15px;
  left:15px;
  z-index:999;

  background:rgba(0,0,0,.75);
  color:white;

  padding:10px 14px;

  border-radius:10px;

  font-size:16px;
  text-decoration:none;
}

/* 提示框 */
#hint{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);

  z-index:999;

  background:rgba(0,0,0,.7);

  color:white;

  padding:12px 18px;

  border-radius:14px;

  font-size:15px;

  text-align:center;

  line-height:1.7;
}

/* 背景音樂 */
#bgmFrame{
  position:fixed;
  width:0;
  height:0;
  border:none;
  opacity:0;
  pointer-events:none;
}
</style>

<script>

/* 手勢控制 */

AFRAME.registerComponent("stable-gesture", {

  init:function(){

    const model = this.el;

    let scale = 0.28;
    let rotationY = 0;

    let lastDistance = null;
    let lastAngle = null;

    let lastTapTime = 0;

    /* 計算雙指距離 */

    function distance(t1,t2){

      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;

      return Math.sqrt(dx*dx + dy*dy);
    }

    /* 計算旋轉角度 */

    function angle(t1,t2){

      return Math.atan2(
        t2.clientY - t1.clientY,
        t2.clientX - t1.clientX
      );
    }

    /* 觸控開始 */

    window.addEventListener("touchstart", function(e){

      if(e.touches.length === 2){

        lastDistance = distance(
          e.touches[0],
          e.touches[1]
        );

        lastAngle = angle(
          e.touches[0],
          e.touches[1]
        );
      }

      /* 雙擊重設 */

      if(e.touches.length === 1){

        const now = Date.now();

        if(now - lastTapTime < 350){

          scale = 0.28;
          rotationY = 0;

          model.setAttribute(
            "scale",
            "0.28 0.28 0.28"
          );

          model.setAttribute(
            "rotation",
            "0 0 0"
          );
        }

        lastTapTime = now;
      }

    }, {passive:false});

    /* 觸控移動 */

    window.addEventListener("touchmove", function(e){

      if(e.touches.length === 2){

        e.preventDefault();

        const newDistance = distance(
          e.touches[0],
          e.touches[1]
        );

        const newAngle = angle(
          e.touches[0],
          e.touches[1]
        );

        /* 縮放 */

        if(lastDistance){

          const change = newDistance / lastDistance;

          scale = scale * change;

          scale = Math.max(
            0.15,
            Math.min(0.75, scale)
          );

          model.setAttribute(
            "scale",
            `${scale} ${scale} ${scale}`
          );
        }

        /* 旋轉 */

        if(lastAngle !== null){

          const angleChange = newAngle - lastAngle;

          rotationY += angleChange * 70;

          model.setAttribute(
            "rotation",
            `0 ${rotationY} 0`
          );
        }

        lastDistance = newDistance;
        lastAngle = newAngle;
      }

    }, {passive:false});

    /* 手勢結束 */

    window.addEventListener("touchend", function(){

      lastDistance = null;
      lastAngle = null;

    });

  }

});
</script>

</head>

<body>

<!-- 背景音樂 -->

<iframe
  src="bgm.html"
  allow="autoplay"
  id="bgmFrame">
</iframe>

<!-- 返回 -->

<a id="back" href="finalexam.html">
返回地圖
</a>

<!-- 提示 -->

<div id="hint">
請掃描 interactive 圖片<br>
雙指拉合縮放｜雙指旋轉｜雙擊歸位
</div>

<!-- AR 場景 -->

<a-scene

mindar-image="
  imageTargetSrc: ./interactive.mind;
  autoStart: true;
  uiLoading: true;
  uiError: true;
  uiScanning: true;
  filterMinCF: 0.001;
  filterBeta: 0.01;
"

color-space="sRGB"

renderer="
  colorManagement: true;
  physicallyCorrectLights: true;
  antialias: true
"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false">

<!-- 模型素材 -->

<a-assets>

  <a-asset-item
    id="rockObj"
    src="./Rock1.obj">
  </a-asset-item>

  <a-asset-item
    id="rockMtl"
    src="./Rock1.mtl">
  </a-asset-item>

</a-assets>

<!-- 光源 -->

<a-light
  type="ambient"
  intensity="1.8">
</a-light>

<a-light
  type="directional"
  intensity="1.2"
  position="1 2 1">
</a-light>

<!-- 攝影機 -->

<a-camera
  look-controls="enabled:false">
</a-camera>

<!-- 掃描成功後 -->

<a-entity mindar-image-target="targetIndex: 0">

  <!-- 3D 岩石模型 -->

  <a-entity
    id="rockModel"

    obj-model="
      obj: #rockObj;
      mtl: #rockMtl
    "

    position="0 -0.1 0"

    rotation="0 0 0"

    scale="0.28 0.28 0.28"

    shadow="
      cast: true;
      receive: false
    "

    stable-gesture>
  </a-entity>

  <!-- 標題 -->

  <a-text
    value="3D 岩石互動"

    position="0 -0.8 0"

    align="center"

    color="#FFD54F"

    width="2.5">
  </a-text>

</a-entity>

</a-scene>

</body>
</html>
